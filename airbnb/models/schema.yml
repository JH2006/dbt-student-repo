version: 2

models:
  - name: dim_listings_clean
    data_tests:
    - minimum_row_counts:
        arguments: 
          min_row_count: 1000 
    columns:
        - name: listing_id 
          description: Primary key for the listing
          data_tests:
            - unique
            - not_null

        - name: host_id
          description: The hosts's id. References the host table.
          data_tests:
            - not_null
            - relationships:
                arguments:
                  to: ref('dim_hosts_clean')
                  field: host_id

        - name: room_type
          description: Type of the apartment / room
          data_tests:
            - accepted_values:
                arguments:
                  values: ['Entire home/apt',
                          'Private room',
                          'Shared room',
                          'Hotel room']

        - name: minimum_nights
          data_tests:
            - positive_values

  - name: dim_hosts_clean
    config:
      contract:
        enforced: true
    columns:
        - name: host_id
          data_type: integer
          data_tests:
            - not_null
            - unique
        - name: host_name
          data_tests:
            - not_null
          data_type: string
        - name: is_superhost
          data_type: string
          data_tests:
            - accepted_values:
                arguments:
                  values: ['t', 'f']
        - name: updated_at
          data_type: timestamp
        - name: created_at
          data_type: timestamp

  - name: dim_listings_w_hosts
    data_tests:
        - dbt_expectations.expect_table_row_count_to_equal_other_table:
            arguments:
              compare_model: source('airbnb', 'listings')
    columns:
        - name: price
          data_tests:
            - dbt_expectations.expect_column_quantile_values_to_be_between:
                arguments:
                  quantile: 0.99
                  min_value: 50
                  max_value: 500
            - dbt_expectations.expect_column_max_to_be_between:
                arguments:
#                  min_value: 50
                  max_value: 500
                config:
                  severity: warn